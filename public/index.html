<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aixain Social</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="auth-screen">
        <div class="auth-container">
            <h1 class="instagram-font">Aixain</h1>
            <p class="auth-subtitle">Sign in to your network.</p>
            <form onsubmit="event.preventDefault(); handleAuth('login');">
                <input type="email" id="email-input" class="auth-input" placeholder="Email Address" required>
                <input type="password" id="password-input" class="auth-input" placeholder="Password (Min 6)" required>
                <button type="submit" class="auth-btn btn-blue">Log In</button>
            </form>
            <div class="divider"><span>OR</span></div>
            <button onclick="handleAuth('create')" class="auth-btn btn-transparent">Create Account</button>
            <p id="auth-msg"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        
        <header class="top-header">
            <h1 class="instagram-font-small">Aixain</h1>
            <div class="header-icons">
                <i class="fa-regular fa-square-plus" onclick="switchTab('upload')"></i>
                <i class="fa-regular fa-heart" onclick="toggleNotifications()"></i>
                <div id="notif-badge" class="badge hidden">!</div>
            </div>
        </header>

        <div id="notifications-panel" class="hidden">
            <h3 style="padding: 15px; border-bottom: 1px solid #262626;">Activity</h3>
        </div>

        <main id="main-content">
            
            <div id="feed-tab" class="tab-content active">
                <div class="feed-wrapper">
                    <div class="stories-container" id="story-bar">
                        <label for="story-upload" class="story-bubble add-story" style="cursor: pointer;">
                            <i class="fa-solid fa-plus"></i><p>Your Story</p>
                        </label>
                        <input type="file" id="story-upload" accept="image/*" class="stealth-input" onchange="uploadStory(event)">
                    </div>
                    <div id="feed-container"></div>
                </div>
            </div>

            <div id="reels-tab" class="tab-content hidden">
                <div id="reels-container" class="reel-scroll-area">
                    </div>
            </div>

            <div id="upload-tab" class="tab-content hidden">
                <div class="feed-wrapper" style="padding: 20px;">
                    <h2 class="section-title" style="border:none;">Upload Media</h2>
                    <div class="upload-options">
                        <button class="upload-btn active" id="btn-post" onclick="toggleUploadType('post')">Post</button>
                        <button class="upload-btn" id="btn-reel" onclick="toggleUploadType('reel')">Reel</button>
                    </div>
                    <div class="upload-area">
                        <label for="media-upload" class="square-preview" id="preview-box">
                            <i class="fa-regular fa-image" id="preview-icon" style="font-size: 50px; color: #555;"></i>
                            <p id="preview-text">Tap Gallery</p>
                            <img id="image-preview" class="hidden preview-media">
                            <video id="video-preview" class="hidden preview-media" autoplay loop muted></video>
                        </label>
                        <input type="file" id="media-upload" accept="image/*,video/*" class="stealth-input" onchange="loadGallery(event)">
                        <input type="text" id="post-caption" class="caption-input" placeholder="Write a caption...">
                        <button onclick="publishMedia()" class="btn-blue publish-btn">Share</button>
                    </div>
                </div>
            </div>

            <div id="chat-tab" class="tab-content hidden">
                <div class="feed-wrapper" style="height: 100%; display: flex; flex-direction: column;">
                    <div class="chat-header-tabs">
                        <button class="chat-tab-btn active" onclick="switchChatView('messages')">Messages</button>
                        <button class="chat-tab-btn" onclick="switchChatView('friends')">Search</button>
                    </div>

                    <div id="messages-view">
                        <div id="inbox-list"><p style="padding:20px; color:#555;">No messages yet.</p></div>
                    </div>

                    <div id="friends-view" class="hidden">
                        <div class="search-box">
                            <i class="fa-solid fa-magnifying-glass search-icon"></i>
                            <input type="text" id="friend-search" placeholder="Search accounts..." onkeyup="executeSearch()">
                        </div>
                        <div id="search-results-list"></div>
                    </div>
                </div>
            </div>

            <div id="profile-tab" class="tab-content hidden">
                <div class="feed-wrapper">
                    <div class="profile-header-actions">
                        <span id="profile-username" style="font-size: 20px; font-weight: bold;">User</span>
                    </div>

                    <div class="profile-header">
                        <label for="pfp-upload" class="avatar large clickable-avatar" id="my-profile-pic" style="cursor: pointer; z-index: 10;">
                            <div class="pfp-overlay"><i class="fa-solid fa-camera"></i></div>
                        </label>
                        <input type="file" id="pfp-upload" accept="image/*" class="stealth-input" onchange="changeProfilePic(event)">
                        
                        <div class="profile-stats">
                            <div class="stat"><strong id="stat-posts">0</strong><p>Posts</p></div>
                            <div class="stat"><strong id="stat-followers">1</strong><p>Followers</p></div>
                            <div class="stat"><strong id="stat-following">0</strong><p>Following</p></div>
                        </div>
                    </div>
                    <div class="profile-info">
                        <h3 id="profile-realname">Your Name</h3>
                        <p id="profile-bio">Welcome to my profile.</p>
                    </div>
                    <div class="profile-grid" id="my-profile-grid"></div>
                </div>
            </div>

        </main>

        <nav class="bottom-nav">
            <button onclick="switchTab('feed')" class="nav-btn active-nav" id="nav-feed"><i class="fa-solid fa-house"></i></button>
            <button onclick="switchTab('reels')" class="nav-btn" id="nav-reels"><i class="fa-solid fa-clapperboard"></i></button>
            <button onclick="switchTab('upload')" class="nav-btn" id="nav-upload"><i class="fa-regular fa-square-plus" style="font-size: 24px;"></i></button>
            <button onclick="switchTab('chat')" class="nav-btn" id="nav-chat"><i class="fa-brands fa-facebook-messenger"></i></button>
            <button onclick="switchTab('profile')" class="nav-btn" id="nav-profile"><div class="nav-avatar" id="nav-pfp"></div></button>
        </nav>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
