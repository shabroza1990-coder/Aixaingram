<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aixain Social</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="settings-modal" class="hidden full-screen-overlay" style="z-index:100000;">
        <div class="top-header" style="background:#000;">
            <i class="fa-solid fa-arrow-left" style="font-size:24px; cursor:pointer;" onclick="closeSettings()"></i>
            <h1 style="font-weight:bold; font-size:18px;">Settings & Privacy</h1>
            <div style="width:24px;"></div>
        </div>
        <div style="padding: 20px;">
            <div class="setting-item"><i class="fa-solid fa-lock"></i> Account Security</div>
            <div class="setting-item"><i class="fa-solid fa-bell"></i> Notifications</div>
            <div class="setting-item"><i class="fa-solid fa-palette"></i> App Theme (Sky Blue)</div>
            <div class="setting-item" style="color: #ed4956;" onclick="location.reload()"><i class="fa-solid fa-right-from-bracket"></i> Log Out</div>
        </div>
    </div>

    <div id="forgot-modal" class="hidden full-screen-overlay" style="justify-content:center; padding:20px; z-index:100001;">
        <div class="auth-container" style="background:#000;">
            <h2 style="margin-bottom:15px; color:#0ea5e9;">Account Recovery</h2>
            <input type="email" id="recover-email" class="auth-input" placeholder="Enter your Email">
            <button onclick="fetchSecQuestion()" class="auth-btn btn-skyblue">Find Account</button>
            
            <div id="recover-step-2" class="hidden" style="margin-top:20px;">
                <p id="recover-question-text" style="color:#ff69b4; font-weight:bold; margin-bottom:10px;"></p>
                <input type="text" id="recover-answer" class="auth-input" placeholder="Enter Secret Answer">
                <button onclick="submitRecovery()" class="auth-btn btn-skyblue">Reveal Password</button>
            </div>
            <p id="recover-msg" style="margin-top:15px; color:#ed4956; font-size:14px;"></p>
            <button onclick="closeForgot()" class="auth-btn btn-transparent" style="margin-top:20px;">Back to Login</button>
        </div>
    </div>

    <div id="story-modal" class="hidden"><div id="story-progress-bar"></div><img id="story-image-display" src=""><i class="fa-solid fa-xmark close-story" onclick="closeStory()"></i><div id="story-author-name">@username</div></div>
    
    <div id="view-profile-modal" class="hidden full-screen-overlay">
        <div class="top-header" style="background:#000;"><i class="fa-solid fa-arrow-left" style="font-size:24px; cursor:pointer;" onclick="closeProfileModal()"></i><h1 id="view-profile-username" style="font-weight:bold; font-size:18px;">Username</h1><div style="width:24px;"></div></div>
        <div class="feed-wrapper" style="overflow-y: auto; height: calc(100% - 60px);">
            <div class="profile-header"><div class="avatar large" id="view-profile-pic"></div><div class="profile-stats"><div class="stat"><strong id="view-stat-posts">0</strong><p>Posts</p></div><div class="stat"><strong id="view-stat-followers">0</strong><p>Followers</p></div><div class="stat"><strong id="view-stat-following">0</strong><p>Following</p></div></div></div>
            <div class="profile-info"><h3 id="view-profile-realname">Name</h3></div><div class="profile-grid" id="view-profile-grid"></div>
        </div>
    </div>

    <div id="auth-screen">
        <div class="auth-container">
            <h1 class="instagram-font" style="color:#0ea5e9;">Aixain</h1>
            <form onsubmit="event.preventDefault(); handleAuth();">
                <input type="email" id="email-input" class="auth-input" placeholder="Email Address" required>
                <input type="password" id="password-input" class="auth-input" placeholder="Password" required>
                
                <div id="signup-extras" class="hidden" style="margin-top:10px;">
                    <input type="text" id="sec-question" class="auth-input" placeholder="Create Security Question (e.g. Pet's Name?)">
                    <input type="text" id="sec-answer" class="auth-input" placeholder="Secret Answer">
                </div>

                <button type="submit" id="auth-main-btn" class="auth-btn btn-skyblue">Log In</button>
            </form>
            <p style="margin-top:15px; font-size:12px; color:#0ea5e9; cursor:pointer;" onclick="openForgot()">Forgot Password?</p>
            <div class="divider"><span>OR</span></div>
            <button onclick="toggleSignupMode()" id="auth-toggle-btn" class="auth-btn btn-transparent">Create Secure Account</button>
            <p id="auth-msg"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="top-header">
            <h1 class="instagram-font-small" style="color:#0ea5e9;">Aixain</h1>
            <div class="header-icons">
                <i class="fa-regular fa-square-plus" onclick="switchTab('upload')"></i>
                <div style="position: relative;"><i class="fa-regular fa-heart" onclick="toggleNotifications()"></i><div id="notif-badge" class="badge hidden">0</div></div>
            </div>
        </header>

        <div id="notifications-panel" class="hidden">
            <h3 style="padding: 15px; border-bottom: 1px solid #262626; color:#0ea5e9;">Activity</h3>
            <div id="notif-list"><p style="padding:15px; color:#555; font-size:14px;">No new notifications.</p></div>
        </div>

        <main id="main-content">
            <div id="feed-tab" class="tab-content active">
                <div class="feed-wrapper">
                    <div class="stories-container" id="story-bar">
                        <label for="story-upload" class="story-bubble add-story" style="cursor: pointer;"><i class="fa-solid fa-plus"></i><p>Your Story</p></label>
                        <input type="file" id="story-upload" accept="image/*" class="stealth-input" onchange="uploadStory(event)">
                    </div>
                    <div id="feed-container"></div>
                </div>
            </div>

            <div id="reels-tab" class="tab-content hidden"><div id="reels-container" class="reel-scroll-area"></div></div>

            <div id="upload-tab" class="tab-content hidden">
                <div class="feed-wrapper" style="padding: 20px;">
                    <div class="upload-options"><button class="upload-btn active" id="btn-post" onclick="toggleUploadType('post')">Post</button><button class="upload-btn" id="btn-reel" onclick="toggleUploadType('reel')">Reel</button></div>
                    <div class="upload-area">
                        <label for="media-upload" class="square-preview" id="preview-box">
                            <i class="fa-regular fa-image" id="preview-icon" style="font-size: 50px; color: #555;"></i>
                            <img id="image-preview" class="hidden preview-media"><video id="video-preview" class="hidden preview-media" autoplay loop muted></video>
                        </label>
                        <input type="file" id="media-upload" accept="image/*,video/*" class="stealth-input" onchange="loadGallery(event)">
                        <div id="reel-extras" class="hidden" style="width: 100%; max-width: 400px; text-align: left; margin-bottom: 10px;">
                            <input type="text" id="reel-title" class="caption-input" placeholder="Reel Title..." style="margin-bottom: 10px; font-weight:bold; font-size:18px;">
                            <label style="color:white; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px;"><input type="checkbox" id="reel-comments-on" checked style="width: 18px; height: 18px;"> Allow Comments</label>
                        </div>
                        <input type="text" id="post-caption" class="caption-input" placeholder="Write a description...">
                        <button onclick="publishMedia()" class="btn-skyblue publish-btn" style="margin-top:15px;">Share</button>
                    </div>
                </div>
            </div>

            <div id="chat-tab" class="tab-content hidden">
                <div class="feed-wrapper" style="height: 100%;">
                    <div class="chat-header-tabs"><button class="chat-tab-btn active">Find Accounts</button></div>
                    <div class="search-box"><i class="fa-solid fa-magnifying-glass search-icon"></i><input type="text" id="friend-search" placeholder="Search for real people..." onkeyup="executeSearch()"></div>
                    <div id="search-results-list"></div>
                </div>
            </div>

            <div id="profile-tab" class="tab-content hidden">
                <div class="feed-wrapper">
                    <div class="profile-header-actions"><span id="profile-username" style="font-size: 20px; font-weight: bold;">User</span><i class="fa-solid fa-gear" style="font-size:22px; cursor:pointer;" onclick="openSettings()"></i></div>
                    <div class="profile-header">
                        <label for="pfp-upload" class="avatar large clickable-avatar" id="my-profile-pic" style="cursor: pointer;"><div class="pfp-overlay"><i class="fa-solid fa-camera"></i></div></label>
                        <input type="file" id="pfp-upload" accept="image/*" class="stealth-input" onchange="changeProfilePic(event)">
                        <div class="profile-stats">
                            <div class="stat"><strong id="stat-posts">0</strong><p>Posts</p></div>
                            <div class="stat clickable"><strong id="stat-followers">0</strong><p>Followers</p></div>
                            <div class="stat clickable"><strong id="stat-following">0</strong><p>Following</p></div>
                        </div>
                    </div>
                    <div class="profile-info"><h3 id="profile-realname">Your Name</h3></div><div class="profile-grid" id="my-profile-grid"></div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button onclick="switchTab('feed')" class="nav-btn active-nav" id="nav-feed"><i class="fa-solid fa-house"></i></button>
            <button onclick="switchTab('reels')" class="nav-btn" id="nav-reels"><i class="fa-solid fa-clapperboard"></i></button>
            <button onclick="switchTab('upload')" class="nav-btn" id="nav-upload"><i class="fa-regular fa-square-plus" style="font-size: 24px;"></i></button>
            <button onclick="switchTab('chat')" class="nav-btn" id="nav-chat"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button onclick="switchTab('profile')" class="nav-btn" id="nav-profile"><div class="nav-avatar" id="nav-pfp"></div></button>
        </nav>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
